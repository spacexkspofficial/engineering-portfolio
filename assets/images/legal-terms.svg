<svg width="1600" height="1200" viewBox="0 0 1600 1200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-terms" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06091a"/>
      <stop offset="1" stop-color="#0a1530"/>
    </linearGradient>
    <linearGradient id="card-terms" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#101a35"/>
      <stop offset="1" stop-color="#0a1326"/>
    </linearGradient>
    <radialGradient id="glow-terms" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#5b8dff" stop-opacity="0.36"/>
      <stop offset="1" stop-color="#5b8dff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2-terms" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#58e1ff" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#58e1ff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="1200" fill="url(#bg-terms)"/>

  <!-- Ambient glows -->
  <circle cx="1320" cy="240" r="320" fill="url(#glow-terms)"/>
  <circle cx="280" cy="980" r="320" fill="url(#glow2-terms)"/>

  <!-- Grid pattern -->
  <g stroke="rgba(146, 173, 222, 0.06)" stroke-width="1">
    <path d="M0 200H1600M0 400H1600M0 600H1600M0 800H1600M0 1000H1600"/>
    <path d="M200 0V1200M400 0V1200M600 0V1200M800 0V1200M1000 0V1200M1200 0V1200M1400 0V1200"/>
  </g>

  <!-- Outer card -->
  <rect x="92" y="92" width="1416" height="1016" rx="40" fill="url(#card-terms)" stroke="rgba(146, 173, 222, 0.18)" stroke-width="2"/>

  <!-- Document panel (left) -->
  <rect x="220" y="220" width="640" height="760" rx="32" fill="rgba(255,255,255,0.025)" stroke="rgba(146, 173, 222, 0.18)" stroke-width="2"/>

  <!-- Doc title -->
  <rect x="280" y="288" width="80" height="6" rx="3" fill="#8fb3ff"/>
  <text x="280" y="356" fill="#f4f7fc" font-family="Space Grotesk, Inter, sans-serif" font-size="44" font-weight="600" letter-spacing="-1">Site terms</text>

  <!-- Numbered list rows -->
  <circle cx="296" cy="424" r="14" fill="rgba(91, 141, 255, 0.18)" stroke="#8fb3ff" stroke-width="2"/>
  <text x="296" y="431" fill="#8fb3ff" font-family="Space Grotesk, Inter, sans-serif" font-size="20" font-weight="600" text-anchor="middle">1</text>
  <rect x="332" y="416" width="460" height="14" rx="7" fill="rgba(244,247,252,0.65)"/>
  <rect x="332" y="442" width="380" height="10" rx="5" fill="rgba(244,247,252,0.18)"/>

  <circle cx="296" cy="510" r="14" fill="rgba(91, 141, 255, 0.18)" stroke="#8fb3ff" stroke-width="2"/>
  <text x="296" y="517" fill="#8fb3ff" font-family="Space Grotesk, Inter, sans-serif" font-size="20" font-weight="600" text-anchor="middle">2</text>
  <rect x="332" y="502" width="460" height="14" rx="7" fill="rgba(244,247,252,0.65)"/>
  <rect x="332" y="528" width="420" height="10" rx="5" fill="rgba(244,247,252,0.18)"/>

  <circle cx="296" cy="596" r="14" fill="rgba(91, 141, 255, 0.18)" stroke="#8fb3ff" stroke-width="2"/>
  <text x="296" y="603" fill="#8fb3ff" font-family="Space Grotesk, Inter, sans-serif" font-size="20" font-weight="600" text-anchor="middle">3</text>
  <rect x="332" y="588" width="460" height="14" rx="7" fill="rgba(244,247,252,0.65)"/>
  <rect x="332" y="614" width="340" height="10" rx="5" fill="rgba(244,247,252,0.18)"/>

  <circle cx="296" cy="682" r="14" fill="rgba(91, 141, 255, 0.18)" stroke="#8fb3ff" stroke-width="2"/>
  <text x="296" y="689" fill="#8fb3ff" font-family="Space Grotesk, Inter, sans-serif" font-size="20" font-weight="600" text-anchor="middle">4</text>
  <rect x="332" y="674" width="460" height="14" rx="7" fill="rgba(244,247,252,0.65)"/>
  <rect x="332" y="700" width="400" height="10" rx="5" fill="rgba(244,247,252,0.18)"/>

  <!-- Approval seal panel (right) -->
  <rect x="940" y="320" width="380" height="500" rx="36" fill="rgba(88, 225, 255, 0.05)" stroke="rgba(88, 225, 255, 0.4)" stroke-width="2"/>

  <!-- Outer ring -->
  <circle cx="1130" cy="570" r="120" fill="none" stroke="rgba(143, 179, 255, 0.3)" stroke-width="3" stroke-dasharray="6 8"/>

  <!-- Inner badge -->
  <circle cx="1130" cy="570" r="86" fill="rgba(91, 141, 255, 0.16)" stroke="#8fb3ff" stroke-width="4"/>

  <!-- Checkmark -->
  <path d="M1086 572L1118 604L1182 540" stroke="#58e1ff" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Status dot -->
  <circle cx="1130" cy="760" r="6" fill="#58e1ff"/>
</svg>
